MODEL:
  SHUFFLE_GROUP: 2          
  SHIFT_NUM: 5                   # 已继承默认，可不写，但显式更清晰
  DROP_PATH: 0.1                 # 保持默认
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: 'jx_vit_base_p16_224-80ecf9dd.pth'  # 预训练权重路径
  TRANSFORMER_FINETUNE_PATH: 'BallShow-TransReID_Checkpoint.pth'  # baseline 权重路径
  CNN_PRETRAIN_PATH: './resnet50-0676ba61.pth'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'hybrid'   # 使用混合模型'hybrid'
  NO_MARGIN: False
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [12, 12]
  SIE_CAMERA: True
  SIE_COE: 3.0
  JPM: True      
  RE_ARRANGE: True
  DROP_OUT: 0.0         
  ATT_DROP_RATE: 0.0 
  ID_LOSS_WEIGHT: 1.0            # ID loss 权重（可保持）
  TRIPLET_LOSS_WEIGHT: 1.0       # 增大 triplet loss 权重，加强度量学习   


INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  NAMES: ballshow
  ROOT_DIR: data

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 150
  BASE_LR: 0.008
  IMS_PER_BATCH: 64
  WARMUP_METHOD: 'linear'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 120
  LOG_PERIOD: 50
  EVAL_PERIOD: 10
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2
  MARGIN: 0.3    # triplet loss margin
  WARMUP_EPOCHS: 5

TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: 'logs/BallShow_vit_transreid_stride'


